services:
  - type: web
    name: pushup-tracker-auth-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    branch: codex/phase1-auth-staging-smoke
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
