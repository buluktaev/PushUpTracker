services:
  - type: web
    name: pushup-tracker-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
