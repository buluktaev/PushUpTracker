<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PushUp Tracker — Лидерборд</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .today-banner {
      text-align: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px 24px;
      margin: 0 auto 32px;
      max-width: 480px;
    }

    .today-banner .label { color: #888; font-size: 0.85rem; }
    .today-banner .count { font-size: 2.5rem; font-weight: 800; color: #ff6b35; }

    table {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 10px 16px;
      color: #666;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #222;
    }

    tbody tr {
      border-bottom: 1px solid #1a1a1a;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #161616; }

    tbody td {
      padding: 14px 16px;
      font-size: 0.95rem;
    }

    .rank { font-weight: 700; font-size: 1rem; width: 40px; color: #555; }
    .rank-1 { color: #ffd700; }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }
    .name { font-weight: 600; }
    .total { font-weight: 700; font-size: 1.05rem; color: #ff6b35; }
    .streak { color: #f59e0b; font-weight: 600; }
    .muted { color: #555; font-size: 0.85rem; }

    #status-row td {
      text-align: center;
      padding: 64px;
      color: #444;
    }

    .updated {
      text-align: center;
      color: #333;
      font-size: 0.8rem;
      margin-top: 32px;
    }
  </style>
</head>
<body>

  <h1>💪 PushUp Tracker</h1>
  <p class="subtitle">Лидерборд команды</p>

  <div class="today-banner">
    <div class="label">Отжиманий сегодня</div>
    <div class="count" id="today-count">—</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Имя</th>
        <th>Всего</th>
        <th>Лучшая серия</th>
        <th>Стрик</th>
        <th>Сессий</th>
      </tr>
    </thead>
    <tbody id="leaderboard-body">
      <tr id="status-row"><td colspan="6">Загрузка...</td></tr>
    </tbody>
  </table>

  <p class="updated" id="updated-at"></p>

  <script>
    const MEDALS = ['🥇', '🥈', '🥉'];

    function cell(text, className) {
      const td = document.createElement('td');
      td.textContent = text;
      if (className) td.className = className;
      return td;
    }

    function buildRow(player, index) {
      const rank = index + 1;
      const tr = document.createElement('tr');

      // Rank / medal
      const rankTd = document.createElement('td');
      rankTd.className = 'rank' + (rank <= 3 ? ` rank-${rank}` : '');
      rankTd.textContent = MEDALS[index] ?? String(rank);
      tr.appendChild(rankTd);

      // Name (user data — textContent only)
      tr.appendChild(cell(player.name, 'name'));

      // Total pushups
      tr.appendChild(cell(player.total_pushups.toLocaleString('ru'), 'total'));

      // Best session
      tr.appendChild(cell(player.best_session.toLocaleString('ru')));

      // Streak
      const streakText = player.streak > 0 ? `🔥 ${player.streak}д` : '—';
      tr.appendChild(cell(streakText, 'streak'));

      // Sessions count
      const sessionsTd = document.createElement('td');
      const span = document.createElement('span');
      span.className = 'muted';
      span.textContent = String(player.sessions_count);
      sessionsTd.appendChild(span);
      tr.appendChild(sessionsTd);

      return tr;
    }

    async function load() {
      try {
        const [lb, stats] = await Promise.all([
          fetch('/api/leaderboard').then(r => r.json()),
          fetch('/api/stats/team').then(r => r.json())
        ]);

        document.getElementById('today-count').textContent = stats.today ?? '—';

        const tbody = document.getElementById('leaderboard-body');
        tbody.replaceChildren();

        if (!lb.length) {
          const tr = document.createElement('tr');
          tr.id = 'status-row';
          const td = document.createElement('td');
          td.colSpan = 6;
          td.textContent = 'Пока никого нет 🤷';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }

        lb.forEach((player, i) => tbody.appendChild(buildRow(player, i)));

        document.getElementById('updated-at').textContent =
          'Обновлено: ' + new Date().toLocaleTimeString('ru-RU');

      } catch {
        const tbody = document.getElementById('leaderboard-body');
        tbody.replaceChildren();
        const tr = document.createElement('tr');
        tr.id = 'status-row';
        const td = document.createElement('td');
        td.colSpan = 6;
        td.textContent = 'Ошибка загрузки данных';
        tr.appendChild(td);
        tbody.appendChild(tr);
      }
    }

    load();
    setInterval(load, 30_000);
  </script>
</body>
</html>
